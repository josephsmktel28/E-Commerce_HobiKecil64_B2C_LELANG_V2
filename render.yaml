services:
  - type: web
    name: HobiKecil
    runtime: docker
    plan: starter
    region: singapore
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    
    envVars:
      - key: APP_NAME
        value: HobiKecil

      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_TIMEZONE
        value: Asia/Jakarta

      - key: APP_URL
        value: https://hobikecil.onrender.com

      - key: APP_LOCALE
        value: en

      - key: APP_FALLBACK_LOCALE
        value: en

      - key: APP_KEY
        value: base64:srcoW1r5V5hr2nq/mcJM2+eXuwqjzLnVGPsIrbQ5KCg=

      # --- Database (Aiven MySQL) ---
      - key: DB_CONNECTION
        value: mysql

      - key: DB_HOST
        value: eccomercehobikecil64-joseph-2246.h.aivencloud.com

      - key: DB_PORT
        value: "25044"

      - key: DB_DATABASE
        value: defaultdb

      - key: DB_USERNAME
        value: avnadmin

      - key: DB_PASSWORD
        value: YOUR_AIVEN_PASSWORD_HERE

      - key: DB_SSL_MODE
        value: REQUIRED

      # --- Logging ---
      - key: LOG_CHANNEL
        value: stack

      - key: LOG_LEVEL
        value: error

      # --- Cache / Session / Queue ---
      - key: CACHE_STORE
        value: database

      - key: SESSION_DRIVER
        value: database

      - key: QUEUE_CONNECTION
        value: database

      - key: FILESYSTEM_DISK
        value: local

      - key: BROADCAST_CONNECTION
        value: log

      # --- Mail ---
      - key: MAIL_MAILER
        value: smtp

      - key: MAIL_HOST
        value: smtp.mailtrap.io

      - key: MAIL_PORT
        value: "2525"

      - key: MAIL_FROM_ADDRESS
        value: noreply@hobikecil.com

      - key: MAIL_FROM_NAME
        value: HobiKecil

      # --- Security ---
      - key: BCRYPT_ROUNDS
        value: "12"

      # --- Midtrans Payment ---
      - key: MIDTRANS_MERCHANT_ID
        value: YOUR_MIDTRANS_MERCHANT_ID

      - key: MIDTRANS_CLIENT_KEY
        value: YOUR_MIDTRANS_CLIENT_KEY

      - key: MIDTRANS_SERVER_KEY
        value: YOUR_MIDTRANS_SERVER_KEY

      - key: MIDTRANS_IS_PRODUCTION
        value: "false"

      # --- Vite ---
      - key: VITE_APP_NAME
        value: HobiKecil
